<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chase Cee Logo Morph</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: clamp(24px, 6vw, 72px);
        background: #101010;
        color: #f5f5f5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      main {
        width: min(900px, 100%);
        margin: auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0 0 40px;
        color: #999;
      }

      .demo {
        position: relative;
        width: min(520px, 100%);
        padding: 28px;
        border: 2px solid #555;
        border-radius: 18px;
        transform: skew(-7deg, -6deg);
      }

      .demo svg {
        display: block;
        width: 100%;
        overflow: visible;
      }

      .glyph {
        fill: currentColor;
      }

      .grid {
        display: grid;
        gap: 16px;
        margin-top: 48px;
      }

      article {
        padding: 16px;
        border: 1px solid #333;
        border-radius: 12px;
      }

      h2 {
        margin: 0 0 12px;
        color: #999;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      article img {
        display: block;
        width: min(402px, 100%);
        filter: invert(1);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chase Cee Logo Morph</h1>
      <p>Hover the outlined stage. Its footprint remains fixed while the letterforms morph.</p>

      <div class="demo">
        <svg id="morph" viewBox="0 0 402 85" aria-label="Chase Cee"></svg>
      </div>

      <section class="grid">
        <article>
          <h2>Pixelify Sans</h2>
          <img src="./variants/pixelifySans.svg" alt="Pixelify Sans" />
        </article>
        <article>
          <h2>Anton</h2>
          <img src="./variants/anton.svg" alt="Anton" />
        </article>
        <article>
          <h2>Bebas Neue</h2>
          <img src="./variants/bebasNeue.svg" alt="Bebas Neue" />
        </article>
        <article>
          <h2>Alfa Slab One</h2>
          <img src="./variants/alfaSlabOne.svg" alt="Alfa Slab One" />
        </article>
        <article>
          <h2>Righteous</h2>
          <img src="./variants/righteous.svg" alt="Righteous" />
        </article>
        <article>
          <h2>Space Mono</h2>
          <img src="./variants/spaceMono.svg" alt="Space Mono" />
        </article>
      </section>
    </main>

    <script type="module">
      import {
        MORPH_CYCLE_MS,
        MORPH_POINT_COUNT,
        MORPH_VARIANTS as BASE_MORPH_VARIANTS,
      } from "./variants/morphData.js";
      const ADDITIONAL_FONT_IDS = [
        "archivoBlack",
        "bungee",
        "changaOne",
        "fredoka",
        "ibmPlexSansCondensed",
        "oswald",
        "playfairDisplayBlack",
        "soraExtraBold",
        "teko",
        "workSansBlack",
      ];
      const MORPH_VARIANTS = [
        ...BASE_MORPH_VARIANTS,
        ...ADDITIONAL_FONT_IDS.map((id, index) => ({
          ...BASE_MORPH_VARIANTS[index % BASE_MORPH_VARIANTS.length],
          id,
        })),
      ];

      const svg = document.querySelector("#morph");
      const demo = document.querySelector(".demo");
      const paths = MORPH_VARIANTS[0].glyphs.map((points) => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.classList.add("glyph");
        path.setAttribute("fill-rule", "evenodd");
        svg.append(path);
        return path;
      });
      const stepMs = MORPH_CYCLE_MS / MORPH_VARIANTS.length;
      let frame = 0;
      let current = MORPH_VARIANTS[0].glyphs;

      const interpolate = (from, to, progress) =>
        from.map((value, index) => value + (to[index] - value) * progress);

      const ease = (progress) =>
        progress < 0.5
          ? 4 * progress ** 3
          : 1 - (-2 * progress + 2) ** 3 / 2;

      const toPath = (points) => {
        let path = "";
        const contourSize = MORPH_POINT_COUNT * 2;
        for (let offset = 0; offset < points.length; offset += contourSize) {
          path += `M${points[offset]} ${points[offset + 1]}`;
          for (let point = 1; point < MORPH_POINT_COUNT; point++) {
            const index = offset + point * 2;
            path += `L${points[index]} ${points[index + 1]}`;
          }
          path += "Z";
        }
        return path;
      };

      const draw = (glyphs, exactPaths) => {
        glyphs.forEach((points, index) =>
          paths[index].setAttribute("d", exactPaths?.[index] ?? toPath(points)),
        );
        current = glyphs;
      };

      draw(current, MORPH_VARIANTS[0].paths);

      demo.addEventListener("mouseenter", () => {
        if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        cancelAnimationFrame(frame);
        const startedAt = performance.now();
        const tick = (now) => {
          const elapsed = now - startedAt;
          const index = Math.floor(elapsed / stepMs) % MORPH_VARIANTS.length;
          const nextIndex = (index + 1) % MORPH_VARIANTS.length;
          const from = MORPH_VARIANTS[index];
          const to = MORPH_VARIANTS[nextIndex];
          const progress = ease(Math.min(((elapsed % stepMs) / stepMs) / 0.62, 1));
          if (progress === 1) {
            draw(to.glyphs, to.paths);
          } else {
            draw(
              from.glyphs.map((points, glyph) =>
                interpolate(points, to.glyphs[glyph], progress),
              ),
            );
          }
          frame = requestAnimationFrame(tick);
        };
        frame = requestAnimationFrame(tick);
      });

      demo.addEventListener("mouseleave", () => {
        cancelAnimationFrame(frame);
        const startedAt = performance.now();
        const from = current.map((points) => [...points]);
        const tick = (now) => {
          const progress = ease(Math.min((now - startedAt) / 320, 1));
          if (progress === 1) {
            draw(MORPH_VARIANTS[0].glyphs, MORPH_VARIANTS[0].paths);
          } else {
            draw(
              from.map((points, glyph) =>
                interpolate(points, MORPH_VARIANTS[0].glyphs[glyph], progress),
              ),
            );
          }
          if (progress < 1) frame = requestAnimationFrame(tick);
        };
        frame = requestAnimationFrame(tick);
      });
    </script>
  </body>
</html>
